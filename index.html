<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>♫ Pixel Music Player ♫</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars"></div>

  <div class="player">
    <div class="screen-title">♪ NOW PLAYING ♪</div>

    <div class="cover-frame">
      <img id="cover" src="images/cover1.jpg" alt="cover" class="cover" />
      <div class="cover-scanlines"></div>
    </div>

    <h3 id="title" class="song-title">Song Title</h3>
    <p id="artist" class="artist-name">Artist Name</p>

    <audio id="audio"></audio>

    <div class="progress-wrap">
      <span id="current" class="time">0:00</span>
      <input type="range" id="progress" value="0" min="0" max="100" step="0.1" />
      <span id="duration" class="time">0:00</span>
    </div>

    <div class="controls">
      <button id="prev" class="btn" aria-label="Previous">◄◄</button>
      <button id="play" class="btn play-btn" aria-label="Play">▶</button>
      <button id="next" class="btn" aria-label="Next">►►</button>
    </div>

    <div class="volume">
      <span class="vol-icon" id="vol-icon">♫</span>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7" />
    </div>

    <div class="playlist">
      <div class="playlist-title">◆ TRACKS ◆</div>
      <ul id="playlist"></ul>
    </div>

    <div class="footer-tag">♥ press start ♥</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
